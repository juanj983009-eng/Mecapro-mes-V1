# ============================================================
# Meca-PRO MES — Configuración de Aplicación
# Perfil: desarrollo local
# ============================================================

server.port=${SERVER_PORT:8081}

# --- PostgreSQL ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mecaprodb}
spring.datasource.username=${DB_USER:mecapro_user}
spring.datasource.password=${DB_PASSWORD:mecapro_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Flyway (migraciones automáticas de schema) ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- Logging ---
logging.level.com.mecapro=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# --- Security / JWT ---
jwt.secret=${JWT_SECRET:MecaProMESSuperStrongSecretKeyForHS256AlgorithmMustBeAtLeast32BytesLong!}