services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mecapro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-mecaprodb}
      POSTGRES_USER:     ${POSTGRES_USER:-mecapro_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mecapro_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mecapro_user} -d ${POSTGRES_DB:-mecaprodb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot API ────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mecapro-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mecaprodb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-mecapro_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-mecapro_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── React Frontend (nginx) ─────────────────────────────────────
  web:
    build:
      context: ./mecapro-web
      dockerfile: Dockerfile
    container_name: mecapro-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  postgres_data:
    name: mecapro_postgres_data
